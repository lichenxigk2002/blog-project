server:
  port: 8000
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/my_blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/
  mail:
    host: gz-smtp.qcloudmail.com
    port: 465
    username: ${TENCENT_CLOUD_MAIL_USERNAME}   # 你的发信邮箱
    password: ${TENCENT_CLOUD_MAIL_PASSWORD}   # 腾讯云邮件推送后台生成的SMTP密码
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
    default-encoding: UTF-8
  # mail:
  #   host: smtp.qq.com
  #   port: 465
  #   username: ${TENCENT_MAIL_USERNAME}
  #   password: ${TENCENT_MAIL_PASSWORD}
  #   properties:
  #     mail.smtp.auth: true
  #     mail.smtp.ssl.enable: true
#  mail:
#    host: smtp.larksuite.com
#    port: 587
#    username: ${CODEBYTE_MAIL_USERNAME}
#    password: ${CODEBYTE_MAIL_PASSWORD}
#    properties:
#      mail.smtp.auth: true
#      mail.smtp.starttls.enable: true
#      mail.smtp.starttls.required: true
#    default-encoding: UTF-8
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

# 安全配置
security:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"

file:
  upload:
    path: ./uploads
    type: cos

# 腾讯云 COS 配置
cos:
  secretId: ${COS_SECRET_ID}
  secretKey: ${COS_SECRET_KEY}
  bucketName: ${COS_BUCKET_NAME}
  region: ${COS_REGION}
  url: ${COS_URL}

app:
  frontend-home: https://www.gfbzsblog.site
