<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title th:text="${success ? '退订成功' : '退订失败'} + ' - 孤芳不自赏的博客'">退订结果 - 孤芳不自赏的博客</title>
  <style>
    body {
      background: #f0f8ff;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .main-card {
      max-width: 500px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 120, 255, 0.15);
      overflow: hidden;
      border: 1px solid #e0f0ff;
      text-align: center;
      padding: 40px 30px;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
    }

    .success-icon.success {
      background: linear-gradient(90deg, #87ceeb 0%, #4169e1 100%);
    }

    .success-icon.error {
      background: linear-gradient(90deg, #ff6b6b 0%, #ee5a52 100%);
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .title.success {
      color: #1e3a8a;
    }

    .title.error {
      color: #d32f2f;
    }

    .message {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      background: linear-gradient(90deg, #87ceeb 0%, #4169e1 100%);
      color: #fff;
      padding: 12px 32px;
      border-radius: 24px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.2s;
    }

    .button:hover {
      background: linear-gradient(90deg, #4169e1 0%, #87ceeb 100%);
    }

    .footer {
      margin-top: 30px;
      color: #bdbdbd;
      font-size: 13px;
    }

    .footer a {
      color: #4169e1;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="main-card">
    <div th:class="${success ? 'success-icon success' : 'success-icon error'}">
      <span th:text="${success ? '✓' : '✗'}">✓</span>
    </div>
    <div th:class="${success ? 'title success' : 'title error'}" th:text="${success ? '退订成功' : '退订失败'}">退订结果</div>
    <div class="message" th:text="${message}">
      您已成功退订孤芳不自赏的博客邮件推送。<br>
      感谢您一直以来的关注与支持！
    </div>
    <a href="https://www.gfbzsblog.site" class="button">返回博客首页</a>
    <div class="footer">
      如有疑问请联系 <a href="mailto:chenxili380@gmail.com">chenxili380@gmail.com</a><br>
      &copy; 2025 By孤芳不自赏
    </div>
  </div>
</body>

</html>
