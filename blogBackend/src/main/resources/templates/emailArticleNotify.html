<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>新文章通知 - 孤芳不自赏的博客</title>
    <style>
        body {
            background: #f0f8ff;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
        }

        .main-card {
            max-width: 600px;
            margin: 32px auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 120, 255, 0.15);
            overflow: hidden;
            border: 1px solid #e0f0ff;
        }

        .content {
            padding: 32px 28px 24px 28px;
            position: relative;
        }

        .greeting {
            width: auto;
            min-width: 200px;
            padding-left: 20px;
            display: flex;
            height: 50px;
            font-size: 20px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 12px;
            position: absolute;
            background: linear-gradient(90deg, #87ceeb 0%, #4169e1 100%);
            box-shadow: 0 2px 8px rgba(0, 120, 255, 0.83);
            border-radius: 50px;
            top: -25px;
            left: 30px;
        }

        .greeting-text {
            justify-content: center;
            align-content: center;
        }

        .title {
            width: 100%;
            font-size: 20px;
            display: flex;
        }

        .title span {
            font-weight: bold;
            color: #1e3a8a;
            margin: auto;
            align-content: center;
            justify-content: center;
        }

        .section {
            margin: 18px 0;
            color: #333;
            font-size: 16px;
            line-height: 1.8;
        }

        .info-box {
            background: #e0f0ff;
            border-radius: 12px;
            padding: 18px 20px;
            margin: 18px 0;
            color: #1e3a8a;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0, 120, 255, 0.08);
        }

        .button {
            display: inline-block;
            background: linear-gradient(90deg, #87ceeb 0%, #4169e1 100%);
            color: #fff;
            padding: 12px 32px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0;
            box-shadow: 0 2px 8px rgba(0, 120, 255, 0.12);
            transition: background 0.2s;
        }

        .button:hover {
            background: linear-gradient(90deg, #4169e1 0%, #87ceeb 100%);
        }

        .ai-assistant {
            text-align: center;
            margin: 24px 0;
        }

        .ai-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 120, 255, 0.15);
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .footer {
            text-align: center;
            color: #bdbdbd;
            font-size: 13px;
            padding: 18px 0 12px 0;
            background: #f0f8ff;
            border-radius: 0 0 24px 24px;
        }

        .footer a {
            color: #4169e1;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .banner {
            width: 100%;
            display: block;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 16px rgba(0, 120, 255, 0.10);
        }
    </style>
</head>

<body>
    <div class="main-card">
        <!-- 顶部横幅图片 -->
        <img src="https://email-1359353257.cos.ap-beijing.myqcloud.com/%E9%82%AE%E4%BB%B6/1741614505077.png" alt="欢迎"
            class="banner">

        <div class="content">
            <div class="greeting">
                <div class="greeting-text">
                    亲爱的<span th:text="${name}"></span>同学：
                </div>
            </div>
            <div class="title">
                <span>孤芳不自赏有新文章啦！</span>
            </div>
            <div class="section">
                <span>桃宝为您推送最新文章，快来阅读吧！</span>
            </div>
            <div class="info-box">
                <div><strong>文章标题：</strong><span th:text="${title}"></span></div>
                <div><strong>发布时间：</strong><span
                        th:text="${#dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm')}"></span></div>
            </div>
            <div class="section">
                文章摘要：<span th:text="${summary}"></span>
            </div>
            <div style="text-align:center;">
                <a th:href="@{https://www.gfbzsblog.site/main/Articles/{id}(id=${articleId})}" class="button">查看当前文章</a>
            </div>

            <div class="ai-assistant">
                <img src="https://email-1359353257.cos.ap-beijing.myqcloud.com/%E9%82%AE%E4%BB%B6/avatar.png"
                    alt="AI助手桃宝" class="ai-avatar">
                <div style="color:#4169e1;font-weight:bold;margin-top:8px;">AI助手桃宝为您推送最新文章！</div>
            </div>
            <div class="info-box" style="text-align:center;">
                欢迎访问：孤芳不自赏的知识空间
            </div>
            <div style="text-align:center;">
                <button onclick="unsubscribe()" class="button" style="border:none;cursor:pointer;">点此退订</button>
            </div>
            <script>
                function unsubscribe() {
                    // 发送DELETE请求到后端退订接口
                    fetch('https://www.gfbzsblog.site/api/subscribe_emails/unsubscribe', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            token: '[[${unsubscribeToken}]]'
                        })
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert('退订成功！感谢您一直以来的关注与支持！');
                            } else {
                                alert('退订失败：' + data.message);
                            }
                        })
                        .catch(error => {
                            alert('退订请求失败，请稍后重试或联系管理员。');
                        });
                }
            </script>
        </div>
        <!-- 底部横幅图片 -->
        <img src="https://email-1359353257.cos.ap-beijing.myqcloud.com/%E9%82%AE%E4%BB%B6/1741614556902.png" alt="再见"
            class="banner" style="margin-bottom:-4px; margin-top:8px;">
        <div class="footer">
            本邮件由系统自动发送，请勿直接回复。<br>
            如有疑问请联系 <a href="mailto:chenxili380@gmail.com">chenxili380@gmail.com</a><br>
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> By孤芳不自赏
        </div>
    </div>
</body>

</html>
