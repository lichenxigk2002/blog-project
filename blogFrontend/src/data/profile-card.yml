# ProfileCard 静态内容配置
profile:
  name: "孤芳不自赏"
  bio: "Java+TypeScript全栈开发者，正在学习HarmonyOS Next，励志成为Web3.0的先锋"
  avatar:
    src: "/images/avatar_20250520_215057.png"
    alt: "用户头像"
    width: 120
    height: 120
    blurDataURL: "/images/avatar_blur.png"
  tags:
    - "🔥前端开发探索者"
    - "📜这里记录代码、思考与成长，分享技巧与前沿技术"
    - "简单·实用·有趣，一起探索前端之美"
  socialLinks:
    github:
      url: "https://github.com/lichenxigk2002"
      text: "My GitHub"
      icon: "FaGithub"
    yuque:
      url: "https://www.yuque.com/gufangbuzishang-lzxva"
      text: "My garden"
      icon: "/images/yuque.png"
      iconType: "image"

animation:
  card:
    initial:
      y: 20
      opacity: 0
    animate:
      y: 0
      opacity: 1
      transition:
        duration: 0.6
        ease: "easeOut"
    hover:
      y: -10
      transition:
        duration: 0.3
        ease: "easeInOut"
  upper:
    initial:
      opacity: 0
      x: -20
    animate:
      opacity: 1
      x: 0
    transition:
      delay: 0.2
      duration: 0.5
  middle:
    initial:
      opacity: 0
      y: 20
    animate:
      opacity: 1
      y: 0
    transition:
      delay: 0.8
      duration: 0.5
  lower:
    initial:
      opacity: 0
      y: 20
    animate:
      opacity: 1
      y: 0
    transition:
      delay: 1.6
      duration: 0.5

tagDelays: [1.0, 1.2, 1.4]